name: skill_exchange
description: Skill Exchange — connect, teach, and learn from each other.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  timeago: ^3.7.0
  url_launcher: ^6.3.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  connectivity_plus: ^6.1.2
  http: ^1.2.2
  crypto: ^3.0.6
  video_player: ^2.9.3
  chewie: ^1.8.5

  # Local Storage
  shared_preferences: ^2.3.5

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Auth
  google_sign_in: ^6.2.2

  # Media
  image_picker: ^1.1.2
  cloudinary_url_gen: ^1.6.0

  # Video Call
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
